<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" width="800" height="180">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1a1333;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1e1145;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.8" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="180" rx="12" fill="url(#bgGrad)"/>

  <!-- Subtle glow behind icon -->
  <circle cx="108" cy="90" r="44" fill="#a78bfa" opacity="0.06"/>
  <circle cx="108" cy="90" r="28" fill="#a78bfa" opacity="0.08"/>

  <!-- Lucide Brain icon (same as web app) -->
  <g transform="translate(108,90) scale(1.8)" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M0-7a3 3 0 0 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 0 6Z"/>
    <path d="M0-7a3 3 0 0 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 0 6Z"/>
    <path d="M3 1a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
    <path d="M5.599-5.5a3 3 0 0 0 .399-1.375"/>
    <path d="M-5.997-6.875A3 3 0 0 0-5.599-5.5"/>
    <path d="M-8.523-1.104a4 4 0 0 1 .585-.396"/>
    <path d="M7.938-1.5a4 4 0 0 1 .585.396"/>
    <path d="M-6 6a4 4 0 0 1-1.967-.516"/>
    <path d="M7.967 5.484A4 4 0 0 1 6 6"/>
  </g>

  <!-- Title text -->
  <text x="170" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#textGrad)" letter-spacing="6">PINKY</text>
  <text x="378" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="300" fill="#6b6185" letter-spacing="2">&amp;</text>
  <text x="414" y="72" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="42" font-weight="800" fill="url(#textGrad)" letter-spacing="4">THE BRAIN</text>

  <!-- Tagline -->
  <text x="172" y="104" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="16" fill="#a78bfa" opacity="0.7" letter-spacing="0.5">AI-powered Kubernetes operations</text>

  <!-- Subtitle -->
  <text x="172" y="128" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="13" fill="#6b6185" letter-spacing="0.3">Investigate. Remediate. Verify. With human approval.</text>

  <!-- Bottom accent line -->
  <rect x="0" y="174" width="800" height="6" rx="3" fill="url(#accentLine)"/>
</svg>
