<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" width="800" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1b4b;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#312e81;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4c1d95;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="brainGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0abfc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e879f9;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#a78bfa;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bgGrad)"/>

  <!-- Decorative grid dots -->
  <g opacity="0.08" fill="white">
    <circle cx="50" cy="30" r="1.5"/><circle cx="90" cy="30" r="1.5"/><circle cx="130" cy="30" r="1.5"/>
    <circle cx="50" cy="60" r="1.5"/><circle cx="90" cy="60" r="1.5"/><circle cx="130" cy="60" r="1.5"/>
    <circle cx="50" cy="90" r="1.5"/><circle cx="90" cy="90" r="1.5"/><circle cx="130" cy="90" r="1.5"/>
    <circle cx="650" cy="110" r="1.5"/><circle cx="690" cy="110" r="1.5"/><circle cx="730" cy="110" r="1.5"/><circle cx="770" cy="110" r="1.5"/>
    <circle cx="650" cy="140" r="1.5"/><circle cx="690" cy="140" r="1.5"/><circle cx="730" cy="140" r="1.5"/><circle cx="770" cy="140" r="1.5"/>
    <circle cx="650" cy="170" r="1.5"/><circle cx="690" cy="170" r="1.5"/><circle cx="730" cy="170" r="1.5"/><circle cx="770" cy="170" r="1.5"/>
  </g>

  <!-- Accent line -->
  <rect x="0" y="194" width="800" height="6" rx="3" fill="url(#brainGrad)" opacity="0.6"/>

  <!-- Logo circle -->
  <circle cx="120" cy="100" r="52" fill="rgba(124,58,237,0.4)" stroke="rgba(167,139,250,0.3)" stroke-width="2"/>

  <!-- Brain icon -->
  <g transform="translate(120,92) scale(0.7)" fill="none" stroke="url(#brainGrad)" stroke-width="4.5" stroke-linecap="round" stroke-linejoin="round">
    <path d="M-8,-30 C-28,-30 -38,-18 -38,-4 C-38,4 -34,10 -28,14 C-34,18 -36,26 -30,32 C-24,38 -14,36 -8,30"/>
    <path d="M-8,-30 C-18,-26 -24,-16 -24,-4"/>
    <path d="M-28,14 C-22,12 -14,14 -8,18"/>
    <path d="M8,-30 C28,-30 38,-18 38,-4 C38,4 34,10 28,14 C34,18 36,26 30,32 C24,38 14,36 8,30"/>
    <path d="M8,-30 C18,-26 24,-16 24,-4"/>
    <path d="M28,14 C22,12 14,14 8,18"/>
    <path d="M0,-30 L0,36"/>
    <circle cx="-16" cy="-10" r="3" fill="#f0abfc" stroke="none"/>
    <circle cx="16" cy="-10" r="3" fill="#f0abfc" stroke="none"/>
    <circle cx="-12" cy="22" r="3" fill="#f0abfc" stroke="none"/>
    <circle cx="12" cy="22" r="3" fill="#f0abfc" stroke="none"/>
    <circle cx="0" cy="4" r="3" fill="#f0abfc" stroke="none"/>
  </g>

  <!-- Title -->
  <text x="200" y="85" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" fill="white" letter-spacing="-1">Pinky</text>

  <!-- Tagline -->
  <text x="200" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#c4b5fd" letter-spacing="0.5">AI-powered Kubernetes operations</text>

  <!-- Subtitle -->
  <text x="200" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#8b83a8">Investigate. Remediate. Verify. With human approval.</text>
