<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 160" width="800" height="160">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0a1e" />
      <stop offset="50%" style="stop-color:#1a1333" />
      <stop offset="100%" style="stop-color:#1e1145" />
    </linearGradient>
    <linearGradient id="pinkGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6" />
      <stop offset="100%" style="stop-color:#e879a8" />
    </linearGradient>
    <linearGradient id="purpleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#c4b5fd" />
      <stop offset="100%" style="stop-color:#a78bfa" />
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#a78bfa;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="160" rx="10" fill="url(#bgGrad)"/>

  <!-- Center everything -->
  <g transform="translate(400, 58)">
    <!-- "Pinky" in pink -->
    <text x="-235" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="url(#pinkGrad)" text-anchor="start" dominant-baseline="central" letter-spacing="1">Pinky</text>

    <!-- "&amp; the" connector -->
    <text x="-37" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="28" font-weight="300" fill="#6b6185" text-anchor="start" dominant-baseline="central">&amp; the</text>

    <!-- "Brain" in purple -->
    <text x="76" y="0" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="48" font-weight="800" fill="url(#purpleGrad)" text-anchor="start" dominant-baseline="central" letter-spacing="1">Brain</text>

    <!-- Small brain icon after "Brain" -->
    <g transform="translate(243, 0) scale(0.85)" fill="none" stroke="#a78bfa" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
      <path d="M0-7a3 3 0 0 0-5.997.125 4 4 0 0 0-2.526 5.77 4 4 0 0 0 .556 6.588A4 4 0 1 0 0 6Z"/>
      <path d="M0-7a3 3 0 0 1 5.997.125 4 4 0 0 1 2.526 5.77 4 4 0 0 1-.556 6.588A4 4 0 1 1 0 6Z"/>
      <path d="M3 1a4.5 4.5 0 0 1-3-4 4.5 4.5 0 0 1-3 4"/>
    </g>
  </g>

  <!-- Tagline -->
  <text x="400" y="100" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="15" fill="#a78bfa" opacity="0.6" text-anchor="middle" letter-spacing="0.5">AI-powered Kubernetes operations</text>

  <!-- Subtitle -->
  <text x="400" y="122" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="12" fill="#5a5270" text-anchor="middle" letter-spacing="0.3">Investigate. Remediate. Verify. With human approval.</text>

  <!-- Bottom accent line -->
  <rect x="0" y="155" width="800" height="5" rx="2.5" fill="url(#accentLine)"/>
</svg>
