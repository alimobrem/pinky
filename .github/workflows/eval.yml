name: LLM Eval

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install deps
        run: pip install -e apps/worker/.[dev] pyyaml
      - name: Run deterministic evals
        working-directory: apps/worker
        run: pytest evals/ -v --tb=short
      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-report
          path: apps/worker/evals/
          retention-days: 30
