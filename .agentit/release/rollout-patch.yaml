apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: pinky
  labels:
    app.kubernetes.io/name: pinky
spec:
  replicas: 2
  revisionHistoryLimit: 5
  rollbackWindow:
    revisions: 2
  selector:
    matchLabels:
      app: pinky
  strategy:
    canary:
      steps:
      - setWeight: 5
      - pause:
          duration: 2m
      - analysis:
          templates:
          - templateName: pinky-success-rate
      - setWeight: 25
      - pause:
          duration: 2m
      - analysis:
          templates:
          - templateName: pinky-success-rate
      - setWeight: 50
      - pause:
          duration: 3m
      - analysis:
          templates:
          - templateName: pinky-success-rate
      - setWeight: 100
      canaryService: pinky-canary
      stableService: pinky
      autoPromotionEnabled: true
      abortScaleDownDelaySeconds: 30
  template:
    metadata:
      labels:
        app: pinky
    spec:
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: pinky
        image: image-registry.openshift-image-registry.svc:5000/agentit/pinky:latest
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 5
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
