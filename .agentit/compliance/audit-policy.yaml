apiVersion: audit.k8s.io/v1
kind: Policy
rules:
- level: RequestResponse
  verbs:
  - create
  - update
  - patch
  - delete
  resources:
  - group: ''
    resources:
    - pods
    - services
    - configmaps
    - secrets
  - group: apps
    resources:
    - deployments
    - statefulsets
    - daemonsets
  - group: rbac.authorization.k8s.io
    resources:
    - roles
    - rolebindings
    - clusterroles
    - clusterrolebindings
- level: Metadata
  verbs:
  - get
  - list
  - watch
  resources:
  - group: ''
    resources:
    - secrets
- level: None
  users:
  - system:kube-proxy
  verbs:
  - watch
  resources:
  - group: ''
    resources:
    - endpoints
    - services
    - services/status
