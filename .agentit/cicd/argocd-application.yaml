apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: pinky
  namespace: openshift-gitops
  labels:
    app.kubernetes.io/name: pinky
spec:
  project: default
  source:
    repoURL: https://github.com/alimobrem/pinky
    targetRevision: HEAD
    path: manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: pinky
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
    syncOptions:
    - CreateNamespace=true
