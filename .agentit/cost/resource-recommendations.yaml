apiVersion: autoscaling.k8s.io/v1
kind: VerticalPodAutoscaler
metadata:
  name: pinky-vpa
  namespace: default
  labels:
    app.kubernetes.io/name: pinky
spec:
  targetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: pinky
  updatePolicy:
    updateMode: 'Off'
  resourcePolicy:
    containerPolicies:
    - containerName: pinky
      minAllowed:
        cpu: 50m
        memory: 64Mi
      maxAllowed:
        cpu: 500m
        memory: 512Mi
