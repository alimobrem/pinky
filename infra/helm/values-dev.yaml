global:
  imageRegistry: quay.io/pinky-project

route:
  enabled: true
  host: pinky.apps.your-cluster.example.com

ingress:
  enabled: false

api:
  replicas: 1
  corsOrigins: '["https://pinky.apps.your-cluster.example.com"]'

worker:
  replicas: 1
  excludeNamespacesRegex: "^(openshift-|kube-|default$)"

web:
  replicas: 1

auth:
  existingSecret: ""
  openshift:
    issuerUrl: https://oauth-openshift.apps.your-cluster.example.com
    clientId: pinky
    clientSecret: ""
    apiUrl: https://api.your-cluster.example.com:6443
  callbackBaseUrl: https://pinky.apps.your-cluster.example.com
  appUrl: https://pinky.apps.your-cluster.example.com

networkPolicy:
  enabled: true

llm:
  provider: vertex
  vertexProjectId: "your-gcp-project"
  vertexRegion: "global"
  existingCredentialsSecret: ""

debug: false
logLevel: INFO
