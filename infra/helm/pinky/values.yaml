global:
  imageRegistry: ""
  imagePullSecrets: []

web:
  replicas: 2
  image:
    repository: pinky-web
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi

api:
  replicas: 2
  image:
    repository: pinky-api
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  corsOrigins: '["https://pinky.example.com"]'

worker:
  replicas: 2
  image:
    repository: pinky-worker
    tag: latest
    pullPolicy: Always
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  observerEnabled: "true"
  temporalEnabled: "true"
  webhooksEnabled: "true"
  scanInterval: "60"

postgresql:
  deploy: true
  image: registry.redhat.io/rhel9/postgresql-16:latest
  storage: 10Gi
  auth:
    username: pinky
    database: pinky
    existingSecret: ""

redis:
  deploy: true
  image: registry.redhat.io/rhel9/redis-7:latest
  storage: 1Gi
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  external:
    url: ""

temporal:
  deploy: true
  image: temporalio/auto-setup:1.25
  uiImage: temporalio/ui:2.31.2
  namespace: pinky
  external:
    address: ""

encryption:
  existingSecret: ""

auth:
  openshift:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    apiUrl: ""
  oidc:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
  callbackBaseUrl: ""
  appUrl: ""
  cookieDomain: ""

route:
  enabled: true
  host: pinky.example.com
  tls:
    termination: edge

ingress:
  enabled: false
  host: pinky.example.com
  className: nginx
  tls: true

networkPolicy:
  enabled: true
  serviceNetwork: "172.30.0.0/16"
  clusterNetwork: "10.128.0.0/14"

llm:
  provider: vertex
  vertexProjectId: ""
  vertexRegion: "us-east5"
  vertexServiceAccountKey: ""

debug: false
logLevel: INFO
