{{- if .Values.postgresql.deploy }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pinky.fullname" . }}-postgresql
  labels:
    app.kubernetes.io/name: pinky-postgresql
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "pinky.fullname" . }}-postgresql-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-postgresql
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-postgresql
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: {{ .Values.postgresql.auth.username }}
            - name: POSTGRESQL_DATABASE
              value: {{ .Values.postgresql.auth.database }}
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          livenessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgresql.auth.username }}"]
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U {{ .Values.postgresql.auth.username }}"]
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: {{ .Values.postgresql.storage }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-postgresql-headless
  labels:
    app.kubernetes.io/name: pinky-postgresql
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: pinky-postgresql
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-postgresql
  labels:
    app.kubernetes.io/name: pinky-postgresql
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: pinky-postgresql
  ports:
    - port: 5432
      targetPort: 5432
{{- end }}
