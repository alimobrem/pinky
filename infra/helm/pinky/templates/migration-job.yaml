apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "pinky.fullname" . }}-migrate
  labels:
    app.kubernetes.io/name: pinky-migrate
    {{- include "pinky.labels" . | nindent 4 }}
  annotations:
    helm.sh/hook: post-install,pre-upgrade
    helm.sh/hook-weight: "-5"
    helm.sh/hook-delete-policy: before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  activeDeadlineSeconds: 600
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-migrate
    spec:
      securityContext:
        runAsNonRoot: true
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-db
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          command:
            - python3
            - -c
            - |
              import socket, time
              host = '{{ include "pinky.fullname" . }}-postgresql'
              while True:
                  try:
                      socket.create_connection((host, 5432), timeout=2).close()
                      print(f'connected to {host}:5432')
                      break
                  except Exception:
                      print(f'waiting for {host}:5432...')
                      time.sleep(2)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: migrate
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          command: ["python", "-m", "alembic", "upgrade", "head"]
          env:
            - name: PINKY_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      restartPolicy: Never
      volumes:
        - name: tmp
          emptyDir: {}
