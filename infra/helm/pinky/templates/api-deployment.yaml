apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-api
  labels:
    app.kubernetes.io/name: pinky-api
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-api
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-db
          image: {{ .Values.postgresql.image }}
          command: ["sh", "-c", "until pg_isready -h {{ include "pinky.fullname" . }}-postgresql -U {{ .Values.postgresql.auth.username }}; do sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: api
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "pinky.fullname" . }}-config
          env:
            - name: PINKY_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url
            - name: PINKY_REDIS__URL
              value: {{ include "pinky.redisUrl" . | quote }}
            - name: PINKY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.encryptionSecretName" . }}
                  key: key
            {{- if .Values.auth.openshift.clientSecret }}
            - name: PINKY_AUTH__OPENSHIFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.fullname" . }}-auth
                  key: openshift-client-secret
            {{- end }}
            {{- if .Values.auth.oidc.clientSecret }}
            - name: PINKY_AUTH__OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.fullname" . }}-auth
                  key: oidc-client-secret
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
