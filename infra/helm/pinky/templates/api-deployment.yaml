apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-api
  labels:
    app.kubernetes.io/name: pinky-api
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      securityContext:
        runAsNonRoot: true
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-db
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          command:
            - python3
            - -c
            - |
              import socket, time
              host = '{{ include "pinky.fullname" . }}-postgresql'
              while True:
                  try:
                      socket.create_connection((host, 5432), timeout=2).close()
                      print(f'connected to {host}:5432')
                      break
                  except Exception:
                      print(f'waiting for {host}:5432...')
                      time.sleep(2)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: api
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "pinky.fullname" . }}-config
          env:
            - name: PINKY_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url
            - name: PINKY_REDIS__URL
              value: {{ include "pinky.redisUrl" . | quote }}
            - name: PINKY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.encryptionSecretName" . }}
                  key: key
            {{- if .Values.auth.openshift.clientSecret }}
            - name: PINKY_AUTH__OPENSHIFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.fullname" . }}-auth
                  key: openshift-client-secret
            {{- end }}
            {{- if .Values.auth.oidc.clientSecret }}
            - name: PINKY_AUTH__OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.fullname" . }}-auth
                  key: oidc-client-secret
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: trusted-ca
              mountPath: /etc/pki/tls/custom
              readOnly: true
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: trusted-ca
          configMap:
            name: {{ include "pinky.fullname" . }}-trusted-ca
            items:
              - key: ca-bundle.crt
                path: ca-bundle.crt
            optional: true
