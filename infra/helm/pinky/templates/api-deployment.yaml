apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-api
  labels:
    app.kubernetes.io/name: pinky-api
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-api
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- if .Values.global.deployId }}
        pinky.openshiftpulse.io/deploy-id: {{ .Values.global.deployId | quote }}
        {{- end }}
    spec:
      securityContext:
        runAsNonRoot: true
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-db
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          command:
            - python3
            - -c
            - |
              import socket, time
              host = '{{ include "pinky.fullname" . }}-postgresql'
              while True:
                  try:
                      socket.create_connection((host, 5432), timeout=2).close()
                      print(f'connected to {host}:5432')
                      break
                  except Exception:
                      print(f'waiting for {host}:5432...')
                      time.sleep(2)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: wait-redis
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          env:
            {{- if .Values.redis.external.existingSecret }}
            - name: PINKY_REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.redisSecretName" . }}
                  key: {{ .Values.redis.external.existingSecretKey }}
            {{- else }}
            - name: PINKY_REDIS_URL
              value: {{ include "pinky.redisUrl" . | quote }}
            {{- end }}
          command:
            - python3
            - -c
            - |
              import os, socket, time
              from urllib.parse import urlparse

              parsed = urlparse(os.environ["PINKY_REDIS_URL"])
              host = parsed.hostname or "localhost"
              port = parsed.port or 6379

              while True:
                  try:
                      socket.create_connection((host, port), timeout=2).close()
                      print(f"connected to {host}:{port}")
                      break
                  except Exception:
                      print(f"waiting for {host}:{port}...")
                      time.sleep(2)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: wait-migrations
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          env:
            - name: PINKY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url-plain
          command:
            - python3
            - -c
            - |
              import asyncio, os
              import asyncpg

              async def main() -> None:
                  dsn = os.environ["PINKY_DATABASE_URL"]
                  while True:
                      try:
                          conn = await asyncpg.connect(dsn)
                          ready = await conn.fetchval(
                              "SELECT to_regclass('public.alembic_version') IS NOT NULL"
                          )
                          await conn.close()
                          if ready:
                              print("migrations applied")
                              break
                      except Exception:
                          pass
                      print("waiting for migrations...")
                      await asyncio.sleep(2)

              asyncio.run(main())
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: api
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.api.image) }}
          imagePullPolicy: {{ .Values.api.image.pullPolicy }}
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: {{ include "pinky.fullname" . }}-config
          env:
            - name: PINKY_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url
            {{- if .Values.redis.external.existingSecret }}
            - name: PINKY_REDIS__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.redisSecretName" . }}
                  key: {{ .Values.redis.external.existingSecretKey }}
            {{- else }}
            - name: PINKY_REDIS__URL
              value: {{ include "pinky.redisUrl" . | quote }}
            {{- end }}
            - name: PINKY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.encryptionSecretName" . }}
                  key: key
            {{- if .Values.auth.openshift.clientId }}
            - name: PINKY_AUTH__OPENSHIFT_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.authSecretName" . }}
                  key: openshift-client-secret
                  optional: true
            {{- end }}
            {{- if .Values.auth.oidc.clientId }}
            - name: PINKY_AUTH__OIDC_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.authSecretName" . }}
                  key: oidc-client-secret
                  optional: true
            {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: ingress-ca
              mountPath: /etc/pki/tls/ingress
              readOnly: true
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          livenessProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /api/v1/readyz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 5
          startupProbe:
            httpGet:
              path: /api/v1/healthz
              port: 8000
            failureThreshold: 30
            periodSeconds: 5
      volumes:
        - name: tmp
          emptyDir: {}
        - name: ingress-ca
          configMap:
            name: {{ include "pinky.fullname" . }}-ingress-ca
            items:
              - key: ingress-ca.crt
                path: ingress-ca.crt
            optional: true
