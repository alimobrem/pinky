apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-api
  labels:
    app.kubernetes.io/name: pinky-api
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: pinky-api
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-web
  labels:
    app.kubernetes.io/name: pinky-web
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: pinky-web
  ports:
    - port: 3000
      targetPort: 3000
