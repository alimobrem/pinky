{{- if .Values.networkPolicy.enabled }}
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pinky.fullname" . }}-api-policy
  labels:
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pinky-api
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: 8000
  egress:
    # In-cluster: service network + pod network (covers DNS, Postgres, Redis, Temporal)
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.serviceNetwork | default "172.30.0.0/16" }}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.clusterNetwork | default "10.128.0.0/14" }}
    # External HTTPS (OAuth, LLM APIs)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - {{ .Values.networkPolicy.serviceNetwork | default "172.30.0.0/16" }}
              - {{ .Values.networkPolicy.clusterNetwork | default "10.128.0.0/14" }}
      ports:
        - port: 443
          protocol: TCP
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "pinky.fullname" . }}-worker-policy
  labels:
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: pinky-worker
  policyTypes:
    - Egress
  egress:
    # In-cluster: service network + pod network
    - to:
        - ipBlock:
            cidr: {{ .Values.networkPolicy.serviceNetwork | default "172.30.0.0/16" }}
        - ipBlock:
            cidr: {{ .Values.networkPolicy.clusterNetwork | default "10.128.0.0/14" }}
    # External HTTPS (LLM APIs, K8s API for observer)
    - to:
        - ipBlock:
            cidr: 0.0.0.0/0
            except:
              - {{ .Values.networkPolicy.serviceNetwork | default "172.30.0.0/16" }}
              - {{ .Values.networkPolicy.clusterNetwork | default "10.128.0.0/14" }}
      ports:
        - port: 443
          protocol: TCP
        - port: 6443
          protocol: TCP
{{- end }}
