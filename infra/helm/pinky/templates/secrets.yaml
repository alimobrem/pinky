{{- if not .Values.postgresql.auth.existingSecret }}
{{- $secretName := printf "%s-db-credentials" (include "pinky.fullname" .) -}}
{{- $existingSecret := lookup "v1" "Secret" .Release.Namespace $secretName -}}
{{- $password := "" -}}
{{- if $existingSecret -}}
  {{- $password = index $existingSecret.data "password" | b64dec -}}
{{- else -}}
  {{- $password = randAlphaNum 24 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretName }}
  labels:
    {{- include "pinky.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $password | quote }}
  url: {{ printf "postgresql+asyncpg://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username $password (include "pinky.fullname" .) .Values.postgresql.auth.database | quote }}
  url-plain: {{ printf "postgresql://%s:%s@%s-postgresql:5432/%s" .Values.postgresql.auth.username $password (include "pinky.fullname" .) .Values.postgresql.auth.database | quote }}
{{- end }}
{{- if .Values.temporal.deploy }}
---
{{- $tdbSecretName := printf "%s-temporal-db-credentials" (include "pinky.fullname" .) -}}
{{- $existingTdbSecret := lookup "v1" "Secret" .Release.Namespace $tdbSecretName -}}
{{- $tdbPassword := "" -}}
{{- if $existingTdbSecret -}}
  {{- $tdbPassword = index $existingTdbSecret.data "password" | b64dec -}}
{{- else -}}
  {{- $tdbPassword = randAlphaNum 24 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $tdbSecretName }}
  labels:
    {{- include "pinky.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  password: {{ $tdbPassword | quote }}
{{- end }}
{{- if not .Values.encryption.existingSecret }}
---
{{- $encSecretName := printf "%s-encryption-key" (include "pinky.fullname" .) -}}
{{- $existingEncSecret := lookup "v1" "Secret" .Release.Namespace $encSecretName -}}
{{- $encKey := "" -}}
{{- if $existingEncSecret -}}
  {{- $encKey = index $existingEncSecret.data "key" | b64dec -}}
{{- else -}}
  {{- $encKey = randAlphaNum 64 | sha256sum | trunc 64 -}}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ $encSecretName }}
  labels:
    {{- include "pinky.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  key: {{ $encKey }}
{{- end }}
{{- if or .Values.auth.openshift.clientSecret .Values.auth.oidc.clientSecret }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "pinky.fullname" . }}-auth
  labels:
    {{- include "pinky.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{- if .Values.auth.openshift.clientSecret }}
  openshift-client-secret: {{ .Values.auth.openshift.clientSecret | quote }}
  {{- end }}
  {{- if .Values.auth.oidc.clientSecret }}
  oidc-client-secret: {{ .Values.auth.oidc.clientSecret | quote }}
  {{- end }}
{{- end }}
