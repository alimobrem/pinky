apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: pinky-worker
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-worker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        fsGroup: 1001
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-db
          image: {{ .Values.postgresql.image }}
          command: ["sh", "-c", "until pg_isready -h {{ include "pinky.fullname" . }}-postgresql -U {{ .Values.postgresql.auth.username }}; do sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: worker
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "pinky.fullname" . }}-config
          env:
            - name: PINKY_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url
            - name: PINKY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url-plain
            - name: PINKY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.encryptionSecretName" . }}
                  key: key
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
