apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-worker
  labels:
    app.kubernetes.io/name: pinky-worker
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-worker
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "pinky.fullname" . }}-observer
      securityContext:
        runAsNonRoot: true
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
        - name: wait-db
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.worker.image) }}
          command:
            - python3
            - -c
            - |
              import socket, time
              host = '{{ include "pinky.fullname" . }}-postgresql'
              while True:
                  try:
                      socket.create_connection((host, 5432), timeout=2).close()
                      print(f'connected to {host}:5432')
                      break
                  except Exception:
                      print(f'waiting for {host}:5432...')
                      time.sleep(2)
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: worker
          image: {{ include "pinky.image" (dict "global" .Values.global "image" .Values.worker.image) }}
          imagePullPolicy: {{ .Values.worker.image.pullPolicy }}
          envFrom:
            - configMapRef:
                name: {{ include "pinky.fullname" . }}-config
          env:
            - name: PINKY_DATABASE__URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url
            - name: PINKY_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.dbSecretName" . }}
                  key: url-plain
            - name: PINKY_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.encryptionSecretName" . }}
                  key: key
          {{- if .Values.llm.vertexServiceAccountKey }}
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /etc/vertex/credentials.json
          {{- end }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            {{- if .Values.llm.vertexServiceAccountKey }}
            - name: vertex-credentials
              mountPath: /etc/vertex
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.llm.vertexServiceAccountKey }}
        - name: vertex-credentials
          secret:
            secretName: {{ include "pinky.fullname" . }}-vertex-credentials
        {{- end }}
