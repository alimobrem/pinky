{{- if .Values.temporal.deploy }}
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "pinky.fullname" . }}-temporal-db
  labels:
    app.kubernetes.io/name: pinky-temporal-db
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  serviceName: {{ include "pinky.fullname" . }}-temporal-db-headless
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-temporal-db
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-temporal-db
    spec:
      securityContext:
        runAsNonRoot: true
      containers:
        - name: postgresql
          image: {{ .Values.postgresql.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRESQL_USER
              value: temporal
            - name: POSTGRESQL_DATABASE
              value: temporal
            - name: POSTGRESQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.fullname" . }}-temporal-db-credentials
                  key: password
          volumeMounts:
            - name: data
              mountPath: /var/lib/pgsql/data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 5Gi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-temporal-db-headless
  labels:
    app.kubernetes.io/name: pinky-temporal-db
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: pinky-temporal-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-temporal-db
  labels:
    app.kubernetes.io/name: pinky-temporal-db
spec:
  selector:
    app.kubernetes.io/name: pinky-temporal-db
  ports:
    - port: 5432
      targetPort: 5432
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-temporal
  labels:
    app.kubernetes.io/name: pinky-temporal
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-temporal
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-temporal
    spec:
      initContainers:
        - name: copy-config
          image: {{ .Values.temporal.image }}
          command: ["sh", "-c", "cp -r /etc/temporal/config/* /temporal-config/"]
          volumeMounts:
            - name: temporal-config
              mountPath: /temporal-config
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
        - name: wait-db
          image: {{ .Values.temporal.image }}
          command: ["sh", "-c", "until nc -z {{ include "pinky.fullname" . }}-temporal-db 5432; do echo 'waiting for temporal-db...'; sleep 2; done"]
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
      containers:
        - name: temporal
          image: {{ .Values.temporal.image }}
          ports:
            - containerPort: 7233
          volumeMounts:
            - name: temporal-config
              mountPath: /etc/temporal/config
            - name: tmpdir
              mountPath: /tmp
          env:
            - name: DB
              value: postgres12
            - name: POSTGRES_USER
              value: temporal
            - name: POSTGRES_PWD
              valueFrom:
                secretKeyRef:
                  name: {{ include "pinky.fullname" . }}-temporal-db-credentials
                  key: password
            - name: POSTGRES_SEEDS
              value: {{ include "pinky.fullname" . }}-temporal-db
            - name: DEFAULT_NAMESPACE
              value: {{ .Values.temporal.namespace }}
            - name: SKIP_SCHEMA_SETUP
              value: "false"
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 1Gi
      volumes:
        - name: temporal-config
          emptyDir: {}
        - name: tmpdir
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-temporal
  labels:
    app.kubernetes.io/name: pinky-temporal
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: pinky-temporal
  ports:
    - port: 7233
      targetPort: 7233
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "pinky.fullname" . }}-temporal-ui
  labels:
    app.kubernetes.io/name: pinky-temporal-ui
    {{- include "pinky.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: pinky-temporal-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: pinky-temporal-ui
    spec:
      containers:
        - name: temporal-ui
          image: {{ .Values.temporal.uiImage }}
          ports:
            - containerPort: 8080
          env:
            - name: TEMPORAL_ADDRESS
              value: {{ include "pinky.fullname" . }}-temporal:7233
            - name: TEMPORAL_CORS_ORIGINS
              value: "http://localhost:3000"
          volumeMounts:
            - name: ui-config
              mountPath: /home/ui-server/config
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: ui-config
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "pinky.fullname" . }}-temporal-ui
  labels:
    app.kubernetes.io/name: pinky-temporal-ui
spec:
  selector:
    app.kubernetes.io/name: pinky-temporal-ui
  ports:
    - port: 8080
      targetPort: 8080
{{- end }}
